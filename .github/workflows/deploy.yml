name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    # Twice daily: 11:00 and 23:00 UTC (~7am / 7pm New York time).
    - cron: '0 11,23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write # commit refreshed data
  pages: write
  id-token: write

# Run bundled JS actions on Node 24 (Node 20 is deprecated on the runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run test suite
        run: npm test

      - name: Refresh events data
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          SONGKICK_API_KEY: ${{ secrets.SONGKICK_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: npm run build:data

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/events.json public/data/neighborhood-cache.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh events data [skip ci]"
            # JSON files can't rebase cleanly when two runs overlap. Instead:
            # save our fresh data, reset to latest remote, re-apply on top.
            git push || {
              git fetch origin main
              cp public/data/events.json /tmp/events_fresh.json
              cp public/data/neighborhood-cache.json /tmp/cache_fresh.json
              git reset --hard origin/main
              cp /tmp/events_fresh.json public/data/events.json
              cp /tmp/cache_fresh.json public/data/neighborhood-cache.json
              git add public/data/events.json public/data/neighborhood-cache.json
              git commit -m "chore: refresh events data [skip ci]"
              git push
            }
          fi

      - name: Build site
        env:
          VITE_MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
