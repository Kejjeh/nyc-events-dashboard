name: Refresh events data

on:
  schedule:
    # Twice daily: 11:00 and 23:00 UTC (~7am / 7pm New York time).
    - cron: '0 11,23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-events
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build events data
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: npm run build:data

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/data/events.json; then
            echo "No changes in events.json — nothing to commit."
          else
            git add public/data/events.json
            git commit -m "chore: refresh events data [skip ci]"
            git push
          fi
